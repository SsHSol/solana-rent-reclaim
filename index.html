<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solana Rent Reclaim - 回收租金</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #07070a; color: #e8e8f0; min-height: 100vh;
    }
    ::selection { background: rgba(124, 58, 237, 0.3); }
    .bg-glow {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(124,58,237,0.08) 0%, transparent 70%),
                  radial-gradient(ellipse 50% 40% at 80% 80%, rgba(99,102,241,0.06) 0%, transparent 60%);
    }

    .container { max-width: 800px; margin: 0 auto; padding: 24px 16px 60px; }

    /* Header */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; max-width: 800px; margin: 0 auto;
    }
    .logo {
      font-size: 20px; font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .network-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
      background: rgba(34, 197, 94, 0.1); color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    .network-badge::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: #22c55e; display: inline-block;
    }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 20px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s ease; font-family: inherit;
    }
    .btn:active { transform: scale(0.97); }
    .btn-accent {
      background: linear-gradient(135deg, #7c3aed, #6366f1);
      color: #fff; box-shadow: 0 0 24px rgba(124,58,237,0.2);
    }
    .btn-accent:hover { box-shadow: 0 0 32px rgba(124,58,237,0.35); transform: translateY(-1px); }
    .btn-accent:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: rgba(255,255,255,0.06); color: #a0a0b8;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); color: #e8e8f0; }
    .btn-danger {
      background: rgba(239,68,68,0.12); color: #f87171;
      border: 1px solid rgba(239,68,68,0.2);
    }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    /* Wallet */
    .wallet-info {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; margin-bottom: 20px;
      background: rgba(124,58,237,0.06); border: 1px solid rgba(124,58,237,0.15);
      border-radius: 14px;
    }
    .wallet-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .wallet-details { flex: 1; min-width: 0; }
    .wallet-name { font-size: 13px; font-weight: 600; color: #e8e8f0; }
    .wallet-addr {
      font-size: 12px; font-family: 'SF Mono', 'Consolas', monospace;
      color: #8888a0; display: block; margin-top: 1px;
    }
    .wallet-balance { font-size: 12px; color: #22c55e; font-weight: 500; margin-left: auto; }

    /* Cards */
    .card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px; padding: 24px; margin-bottom: 16px;
    }
    .card-title {
      display: flex; align-items: center; gap: 10px;
      font-size: 15px; font-weight: 700; color: #c8c8e0; margin-bottom: 16px;
    }

    /* Stats row */
    .stats {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      margin-bottom: 20px;
    }
    .stat-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px; padding: 14px; text-align: center;
    }
    .stat-value { font-size: 20px; font-weight: 700; color: #e8e8f0; }
    .stat-label { font-size: 11px; color: #8888a0; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value.green { color: #22c55e; }
    .stat-value.yellow { color: #eab308; }
    .stat-value.purple { color: #a78bfa; }

    /* Table */
    .token-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .token-table th {
      text-align: left; padding: 10px 12px; font-size: 11px;
      color: #8888a0; text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-weight: 600;
    }
    .token-table td {
      padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04);
      color: #c8c8e0; vertical-align: middle;
    }
    .token-table tr:hover td { background: rgba(255,255,255,0.02); }
    .token-table .mint-addr { font-family: 'SF Mono', 'Consolas', monospace; font-size: 11px; color: #8888a0; }
    .token-table .badge {
      display: inline-block; padding: 2px 8px; border-radius: 6px;
      font-size: 11px; font-weight: 600;
    }
    .badge-token2022 { background: rgba(124,58,237,0.15); color: #a78bfa; }
    .badge-token { background: rgba(34,197,94,0.1); color: #22c55e; }
    .badge-locked { background: rgba(234,179,8,0.1); color: #eab308; }
    .badge-reclaimable { background: rgba(34,197,94,0.1); color: #22c55e; }

    .checkbox {
      width: 18px; height: 18px; border-radius: 4px;
      accent-color: #7c3aed; cursor: pointer;
    }

    /* Progress */
    .progress-area { margin-top: 12px; }
    .progress-item {
      display: flex; align-items: center; gap: 8px; padding: 6px 0;
      font-size: 13px; color: #a0a0b8;
    }
    .progress-item.done { color: #22c55e; }
    .progress-item.error { color: #f87171; }
    .progress-spinner {
      width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.1);
      border-top-color: #7c3aed; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 12px 20px; border-radius: 12px;
      font-size: 13px; color: #e8e8f0;
      display: none; z-index: 100;
    }
    .toast.show { display: flex; align-items: center; gap: 8px; }
    .toast.success { border-color: rgba(34,197,94,0.3); }
    .toast.error { border-color: rgba(239,68,68,0.3); }

    .empty-state {
      text-align: center; padding: 40px 20px; color: #8888a0;
    }
    .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    .tx-link {
      color: #a78bfa; text-decoration: none; font-size: 11px;
      font-family: 'SF Mono', 'Consolas', monospace;
    }
    .tx-link:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .stats { grid-template-columns: 1fr; }
      .token-table { font-size: 12px; }
      .token-table th, .token-table td { padding: 8px 6px; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <header>
    <span class="logo">♻️ Rent Reclaim</span>
    <div class="header-right">
      <span class="network-badge">Mainnet</span>
      <span id="walletBtn"></span>
    </div>
  </header>

  <div class="container">
    <!-- 未连接时 -->
    <div id="connectPrompt" class="card" style="text-align:center;padding:60px 20px;">
      <div style="font-size:48px;margin-bottom:12px;">♻️</div>
      <h2 style="font-size:20px;font-weight:700;margin-bottom:8px;color:#e8e8f0;">回收 Solana 租金</h2>
      <p style="font-size:14px;color:#8888a0;margin-bottom:20px;line-height:1.6;">
        扫描钱包中所有代币账户，一键销毁并关闭以回收 Rent 押金。<br>
        Mint 权限已撤销的代币账户也可关闭（ATA 租金可退还）。
      </p>
      <button class="btn btn-accent" onclick="connectWallet()" id="connectBtn">🔌 连接钱包</button>
      <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;">
        <p style="font-size:12px;color:#6666a0;margin-bottom:8px;">钱包弹窗没反应？试试手动输入地址：</p>
        <div style="display:flex;gap:8px;justify-content:center;max-width:500px;margin:0 auto;">
          <input type="text" id="manualAddr" placeholder="输入 Solana 地址（只读扫描，不上链）"
            style="flex:1;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#e8e8f0;font-family:monospace;font-size:13px;outline:none;">
          <button class="btn btn-ghost" onclick="connectManual()">扫描</button>
        </div>
      </div>
    </div>

    <!-- 已连接后 -->
    <div id="appContent" style="display:none;">
      <!-- 钱包信息 -->
      <div id="walletInfo" class="wallet-info"></div>

      <!-- 统计 -->
      <div class="stats">
        <div class="stat-item">
          <div class="stat-value" id="statTokens">0</div>
          <div class="stat-label">代币账户</div>
        </div>
        <div class="stat-item">
          <div class="stat-value yellow" id="statReclaimable">0</div>
          <div class="stat-label">可回收</div>
        </div>
        <div class="stat-item">
          <div class="stat-value green" id="statEstRent">0.000 SOL</div>
          <div class="stat-label">预估回收</div>
        </div>
      </div>

      <!-- 操作栏 -->
      <div class="card" style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-accent" onclick="scanTokens()" id="scanBtn">🔍 扫描代币</button>
        <button class="btn btn-danger" onclick="executeReclaim()" id="reclaimBtn" disabled>🗑️ 批量回收已选</button>
        <label style="margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:#8888a0;">
          <input type="checkbox" id="selectAll" onchange="toggleAll()"> 全选
        </label>
      </div>

      <!-- 代币列表 -->
      <div class="card">
        <div class="card-title">📋 代币账户列表</div>
        <div id="tokenList"><div class="empty-state">点击「扫描代币」开始</div></div>
      </div>

      <!-- 进度 -->
      <div class="card" id="progressCard" style="display:none;">
        <div class="card-title">⏳ 执行进度</div>
        <div id="progressArea"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- Polyfill -->
  <script src="buffer-polyfill.js"></script>
  <!-- Rent Reclaim bundle (包含 web3.js + spl-token) -->
  <script src="rent-reclaim.js"></script>
</body>
</html>
