<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Solana Rent Reclaim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',sans-serif;background:#07070a;color:#e8e8f0;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:24px 16px 60px}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;max-width:800px;margin:0 auto}
.logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.network-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;background:rgba(34,197,94,0.1);color:#22c55e;border:1px solid rgba(34,197,94,0.2)}
.network-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:#22c55e;display:inline-block}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn-accent{background:linear-gradient(135deg,#7c3aed,#6366f1);color:#fff}
.btn-accent:hover{box-shadow:0 0 32px rgba(124,58,237,0.35);transform:translateY(-1px)}
.btn-accent:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-ghost{background:rgba(255,255,255,.06);color:#a0a0b8;border:1px solid rgba(255,255,255,.08)}
.btn-ghost:hover{background:rgba(255,255,255,.1);color:#e8e8f0}
.btn-danger{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:24px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:700;color:#c8c8e0;margin-bottom:16px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-item{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px;text-align:center}
.stat-value{font-size:20px;font-weight:700;color:#e8e8f0}
.stat-label{font-size:11px;color:#8888a0;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.stat-value.green{color:#22c55e}.stat-value.yellow{color:#eab308}.stat-value.purple{color:#a78bfa}
.token-table{width:100%;border-collapse:collapse;font-size:13px}
.token-table th{text-align:left;padding:10px 12px;font-size:11px;color:#8888a0;border-bottom:1px solid rgba(255,255,255,.06);font-weight:600}
.token-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:#c8c8e0;vertical-align:middle}
.mint-addr{font-family:monospace;font-size:11px;color:#8888a0}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge-t2022{background:rgba(124,58,237,.15);color:#a78bfa}
.badge-tk{background:rgba(34,197,94,.1);color:#22c55e}
.empty-state{text-align:center;padding:40px 20px;color:#8888a0;font-size:14px}
.wallet-info{display:flex;align-items:center;gap:12px;padding:14px 18px;margin-bottom:20px;background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.15);border-radius:14px}
#log{background:#0a0a0f;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:16px;font-family:monospace;font-size:12px;color:#22c55e;white-space:pre-wrap;max-height:400px;overflow-y:auto;margin-top:12px}
input[type=text]{padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#e8e8f0;font-family:monospace;font-size:13px;outline:none;width:100%}
</style>
</head>
<body>
<header>
  <span class="logo">♻️ Rent Reclaim</span>
  <span class="network-badge">Mainnet</span>
</header>
<div class="container">

  <div class="card">
    <div class="card-title">📋 调试日志</div>
    <div id="log">等待初始化...</div>
  </div>

  <div class="card" style="text-align:center;padding:30px;">
    <button class="btn btn-accent" id="connectBtn">🔌 连接钱包</button>
    <button class="btn btn-ghost" id="manualBtn" style="margin-left:8px;">📝 手动输入地址</button>
    <div id="manualInput" style="display:none;margin-top:12px;">
      <input type="text" id="addrInput" placeholder="输入 Solana 钱包地址" style="margin-bottom:8px;">
      <button class="btn btn-accent" id="scanManualBtn">🔍 扫描</button>
    </div>
  </div>

  <div class="card" id="resultCard" style="display:none;">
    <div class="card-title">📋 代币账户</div>
    <div id="tokenList"><div class="empty-state">扫描中...</div></div>
  </div>
</div>

<script src="https://unpkg.com/@solana/web3.js@1.98.0/lib/index.iife.js"></script>
<script>
(function() {
  'use strict';

  const log = document.getElementById('log');
  const $ = id => document.getElementById(id);

  function addLog(msg, isErr) {
    const t = '[' + new Date().toLocaleTimeString() + '] ' + msg;
    log.textContent += '\n' + t;
    log.scrollTop = log.scrollHeight;
    if (isErr) console.error(t); else console.log(t);
  }

  let conn = null, currentWallet = null, allTokens = [];

  addLog('页面加载完成');
  addLog('solanaWeb3: ' + (typeof window.solanaWeb3 !== 'undefined' ? '✅' : '❌'));
  if (!window.solanaWeb3) { addLog('CRITICAL: web3.js 未加载', true); return; }

  const { Connection, PublicKey, LAMPORTS_PER_SOL, Transaction } = window.solanaWeb3;
  const TOKEN2022_PID = 'TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb';
  const TOKEN_PID = 'TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA';
  const RPC_LIST = [
    'https://api.mainnet-beta.solana.com',
    'https://solana-api.projectserum.com',
    'https://rpc.ankr.com/solana',
    'https://solana.publicnode.com',
  ];

  addLog('RPC 备用节点: ' + RPC_LIST.length);

  // 连接 RPC
  async function connectRPC() {
    for (const url of RPC_LIST) {
      try {
        const c = new Connection(url, 'confirmed');
        const s = await c.getSlot();
        addLog('RPC ✅ ' + url.replace('https://','') + ' (slot ' + s + ')');
        return c;
      } catch(e) {
        addLog('RPC ❌ ' + url.replace('https://','') + ': ' + e.message.substring(0,60), true);
      }
    }
    throw new Error('所有 RPC 节点均不可用');
  }

  // 连接钱包
  $('connectBtn').onclick = async function() {
    addLog('点击了「连接钱包」');

    // 列出所有可用钱包
    const wallets = [];
    if (window.phantom?.solana) wallets.push({ name: 'Phantom', provider: window.phantom.solana });
    if (window.okxwallet?.solana) wallets.push({ name: 'OKX', provider: window.okxwallet.solana });
    if (window.solana && !wallets.find(w => w.provider === window.solana)) {
      const name = window.solana.isPhantom ? 'Phantom(window.solana)' : 'solana';
      wallets.push({ name, provider: window.solana });
    }
    if (window.backpack?.solana) wallets.push({ name: 'Backpack', provider: window.backpack.solana });

    addLog('检测到钱包: ' + wallets.map(w => w.name).join(', '));
    if (wallets.length === 0) { addLog('未检测到钱包', true); return; }

    // 尝试每个钱包，OKX 在 HTTP 上工作更好
    for (const { name, provider } of wallets) {
      addLog('尝试 ' + name + '...');
      try {
        const result = await Promise.race([
          provider.connect(),
          new Promise((_, reject) => setTimeout(() => reject(new Error('超时')), 10000))
        ]);
        currentWallet = result.publicKey.toString();
        addLog('✅ ' + name + ' 连接成功! 地址: ' + currentWallet);
        conn = await connectRPC();
        await scanAndShow();
        return;
      } catch(e) {
        addLog('❌ ' + name + ': ' + e.message);
      }
    }
    addLog('所有钱包连接失败。尝试使用手动输入地址模式 ↓', true);
    $('manualInput').style.display = 'block';
  };

  // 手动输入
  $('manualBtn').onclick = function() {
    const el = $('manualInput');
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
    addLog('切换手动输入面板');
  };

  $('scanManualBtn').onclick = async function() {
    const addr = $('addrInput').value.trim();
    if (!addr || addr.length < 32) { addLog('地址格式错误', true); return; }
    try {
      new PublicKey(addr);
      currentWallet = addr;
      addLog('手动模式地址: ' + addr);
      conn = await connectRPC();
      await scanAndShow();
    } catch(e) {
      addLog('地址无效: ' + e.message, true);
    }
  };

  // 扫描
  async function scanAndShow() {
    addLog('开始扫描代币账户...');
    const pk = new PublicKey(currentWallet);
    $('resultCard').style.display = 'block';
    try {
      const [r1, r2] = await Promise.all([
        conn.getTokenAccountsByOwner(pk, { programId: new PublicKey(TOKEN2022_PID) }),
        conn.getTokenAccountsByOwner(pk, { programId: new PublicKey(TOKEN_PID) })
      ]);
      addLog('Token-2022: ' + r1.value.length + ' 个账户');
      addLog('Token: ' + r2.value.length + ' 个账户');
      allTokens = [];
      for (const a of r1.value) {
        const d = a.account.data;
        allTokens.push({
          mint: new PublicKey(d.slice(0,32)).toBase58(),
          balance: Number(d.readBigUInt64LE(64)),
          ata: a.pubkey.toBase58(),
          program: 'Token-2022',
          uiAmount: Number(d.readBigUInt64LE(64)) / 1e9
        });
      }
      for (const a of r2.value) {
        const d = a.account.data;
        allTokens.push({
          mint: new PublicKey(d.slice(0,32)).toBase58(),
          balance: Number(d.readBigUInt64LE(64)),
          ata: a.pubkey.toBase58(),
          program: 'Token',
          uiAmount: Number(d.readBigUInt64LE(64)) / 1e6
        });
      }
      renderTokens();
      addLog('✅ 完成! 共 ' + allTokens.length + ' 个代币账户');
    } catch(e) {
      addLog('❌ 扫描失败: ' + e.message, true);
    }
  }

  function renderTokens() {
    const el = $('tokenList');
    if (allTokens.length === 0) {
      el.innerHTML = '<div class="empty-state">没有找到代币账户</div>';
      return;
    }
    let h = '<table class="token-table"><thead><tr><th>Mint</th><th>余额</th><th>程序</th></tr></thead><tbody>';
    for (const t of allTokens) {
      const b = t.program === 'Token-2022' ? 'badge-t2022' : 'badge-tk';
      h += '<tr><td><div>' + t.mint.slice(0,8) + '…' + t.mint.slice(-4) + '</div><div class="mint-addr">' + t.ata.slice(0,8) + '…</div></td>'
        + '<td>' + t.uiAmount.toLocaleString() + '</td>'
        + '<td><span class="badge ' + b + '">' + t.program + '</span></td></tr>';
    }
    h += '</tbody></table>';
    el.innerHTML = h;
  }

  addLog('初始化完成，等待操作');
})();
</script>
</body>
</html>
